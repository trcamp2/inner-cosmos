<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inner Cosmos — A Personal Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #faf9f7;
    --cosmos: #ece5d8;
    --nebula: #e3dacb;
    --twilight: #d6cbb8;
    --stardust: #8a7b68;
    --silver: #000000;
    --moonlight: #000000;
    --starwhite: #000000;
    --glow: #a3865a;
    --aurora: #8b6f47;
    --celestial: #7a8c6e;
    --gold-accent: #c47a4a;
    --warm-glow: #d49a6a;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'Quicksand', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--starwhite);
    font-family: var(--font-body);
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Starfield Background ── */
  #starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #c2a87a;
    animation: twinkle var(--duration) ease-in-out infinite;
    animation-delay: var(--delay);
  }

  @keyframes twinkle {
    0%, 100% { opacity: var(--min-opacity); }
    50% { opacity: var(--max-opacity); }
  }

  /* ── Nebula glow ── */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }
  .nebula-1 { width: 600px; height: 600px; background: #c47a4a; top: -100px; right: -200px; }
  .nebula-2 { width: 500px; height: 500px; background: #7a8c6e; bottom: 10%; left: -150px; }
  .nebula-3 { width: 400px; height: 400px; background: #a3865a; top: 50%; right: 20%; }

  /* ── Layout ── */
  .app-container {
    position: relative;
    z-index: 1;
    display: flex;
    min-height: 100vh;
  }

  /* ── Sidebar Navigation ── */
  .sidebar {
    width: 260px;
    min-height: 100vh;
    background: linear-gradient(180deg, #ece5d8 0%, #e5ddd0 100%);
    border-right: 1px solid rgba(163,134,90,0.15);
    padding: 40px 0;
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    overflow-y: auto;
    backdrop-filter: blur(20px);
  }

  .site-title {
    font-family: var(--font-display);
    font-size: 28.5px;
    font-weight: 400;
    letter-spacing: 2px;
    color: var(--gold-accent);
    text-align: center;
    padding: 0 24px 8px;
    line-height: 1.2;
  }

  .site-subtitle {
    font-family: var(--font-display);
    font-size: 13.5px;
    font-style: italic;
    color: var(--silver);
    text-align: center;
    padding: 0 24px 36px;
    letter-spacing: 1px;
  }

  .nav-section {
    padding: 0 16px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    margin: 2px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--silver);
    letter-spacing: 0.5px;
  }

  .nav-item:hover {
    background: rgba(163,134,90,0.08);
    color: var(--starwhite);
  }

  .nav-item.active {
    background: rgba(163,134,90,0.12);
    color: var(--gold-accent);
    border-left: 2px solid var(--gold-accent);
  }

  .nav-icon {
    font-size: 18.5px;
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }

  /* ── Main Content ── */
  .main-content {
    margin-left: 260px;
    flex: 1;
    padding: 48px 60px;
    max-width: 960px;
  }

  .page-header {
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(163,134,90,0.1);
  }

  .page-title {
    font-family: var(--font-display);
    font-size: 42.5px;
    font-weight: 400;
    color: var(--starwhite);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .page-epigraph {
    font-family: var(--font-display);
    font-size: 16.5px;
    font-style: italic;
    color: var(--silver);
    letter-spacing: 0.5px;
  }

  /* ── Journal Entries ── */
  .entries-container {
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .entry-card {
    background: linear-gradient(135deg, #ffffff 0%, #fdfcfa 100%);
    border: 1px solid rgba(163,134,90,0.08);
    border-radius: 12px;
    padding: 32px;
    position: relative;
    transition: all 0.3s ease;
  }

  .entry-card:hover {
    border-color: rgba(163,134,90,0.2);
    box-shadow: 0 4px 30px rgba(163,134,90,0.1);
  }

  .entry-date {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--gold-accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .entry-title {
    font-family: var(--font-display);
    font-size: 24.5px;
    font-weight: 400;
    color: var(--starwhite);
    margin-bottom: 16px;
    outline: none;
    min-height: 34px;
  }

  .entry-body {
    font-family: var(--font-body);
    font-size: 15.5px;
    font-weight: 400;
    line-height: 1.8;
    color: var(--starwhite);
    outline: none;
    min-height: 60px;
  }

  .entry-body a, .entry-card a {
    color: var(--celestial);
    text-decoration: none;
    border-bottom: 1px solid rgba(122,140,110,0.3);
    transition: border-color 0.2s;
  }

  .entry-body a:hover { border-color: var(--celestial); }

  .entry-images {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 16px;
  }

  .entry-images img {
    max-width: 300px;
    max-height: 220px;
    border-radius: 8px;
    object-fit: cover;
    border: 1px solid rgba(163,134,90,0.1);
  }

  .entry-actions {
    position: absolute;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .entry-card:hover .entry-actions { opacity: 1; }

  .entry-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid rgba(163,134,90,0.15);
    background: #ece5d8;
    color: var(--silver);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14.5px;
    transition: all 0.2s;
  }

  .entry-btn:hover {
    background: rgba(163,134,90,0.15);
    color: var(--starwhite);
    border-color: rgba(163,134,90,0.3);
  }

  .entry-btn.delete:hover {
    background: rgba(180,80,60,0.1);
    border-color: rgba(180,80,60,0.3);
    color: #c06050;
  }

  /* ── Add Entry Button ── */
  .add-entry-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 18px 32px;
    border: 1px dashed rgba(163,134,90,0.2);
    border-radius: 12px;
    background: transparent;
    color: var(--silver);
    font-family: var(--font-body);
    font-size: 14.5px;
    font-weight: 400;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 8px;
  }

  .add-entry-btn:hover {
    border-color: rgba(163,134,90,0.4);
    color: var(--celestial);
    background: rgba(163,134,90,0.04);
  }

  /* ── Image upload area ── */
  .image-upload-zone {
    margin-top: 12px;
    padding: 12px 16px;
    border: 1px dashed rgba(163,134,90,0.15);
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--silver);
    transition: all 0.2s;
    display: none;
  }

  .entry-card:hover .image-upload-zone,
  .entry-card:focus-within .image-upload-zone {
    display: block;
  }

  .image-upload-zone:hover {
    border-color: rgba(163,134,90,0.3);
    color: var(--moonlight);
  }

  .img-remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: rgba(60,50,40,0.7);
    color: #ddb8a0;
    font-size: 12.5px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .img-wrapper { position: relative; display: inline-block; }
  .img-wrapper:hover .img-remove-btn { display: flex; }

  /* ── Calendar section ── */
  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 24px;
    overflow: visible;
  }

  .cal-header {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--silver);
    text-align: center;
    padding: 8px 0;
    letter-spacing: 1px;
  }

  .cal-day {
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 8px 2px;
    border-radius: 8px;
    font-size: 13.5px;
    color: var(--moonlight);
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
    position: relative;
    overflow: visible;
  }

  .cal-day:hover { background: rgba(163,134,90,0.08); }
  .cal-day.today { border-color: var(--gold-accent); color: var(--gold-accent); }
  .cal-day.has-note {
    background: rgba(163,134,90,0.08);
    border-color: rgba(163,134,90,0.2);
  }
  .cal-day.has-note::after {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold-accent);
    position: absolute;
    bottom: 6px;
  }

  .practice-dots {
    position: absolute;
    top: 3px;
    left: 2px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    z-index: 10;
  }

  .practice-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1.5px solid rgba(120,110,100,0.5);
    background: #d8d0c6;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 7px;
    font-weight: 700;
    font-family: var(--font-body);
    color: rgba(100,90,80,0.6);
    line-height: 1;
  }

  .practice-dot.active {
    color: rgba(255,255,255,0.9);
  }

  .practice-dot:hover {
    transform: scale(1.2);
  }

  /* Yoga - sage green */
  .practice-dot.yoga.active {
    background: #5a8a5a;
    border-color: #4a7a4a;
  }

  /* Meditation - monk saffron/orange */
  .practice-dot.meditation.active {
    background: #d48a3a;
    border-color: #c07a2a;
  }

  /* Aerobic - sky blue */
  .practice-dot.aerobic.active {
    background: #4a8ab0;
    border-color: #3a7a9a;
  }

  /* Strength - warm plum */
  .practice-dot.strength.active {
    background: #9a6a8a;
    border-color: #8a5a7a;
  }

  .cal-note-preview {
    font-size: 9px;
    color: #000000;
    margin-top: 4px;
    line-height: 1.3;
    overflow: hidden;
    text-align: center;
    padding: 0 3px;
    word-wrap: break-word;
    word-break: break-word;
    white-space: normal;
    width: 100%;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  .cal-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #ffffff;
    border: 1px solid rgba(163,134,90,0.25);
    border-radius: 8px;
    padding: 12px 16px;
    min-width: 200px;
    max-width: 280px;
    box-shadow: 0 8px 24px rgba(60,50,40,0.15);
    z-index: 50;
    font-size: 13px;
    font-weight: 400;
    color: #000000;
    line-height: 1.6;
    text-align: left;
    white-space: pre-wrap;
    word-wrap: break-word;
    pointer-events: none;
  }

  .cal-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #ffffff;
  }

  .cal-tooltip::before {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: rgba(163,134,90,0.25);
  }

  .cal-day.has-note:hover .cal-tooltip {
    display: block;
  }

  .cal-day.empty { pointer-events: none; }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 16px;
  }

  .cal-nav-btn {
    background: none;
    border: 1px solid rgba(163,134,90,0.15);
    border-radius: 6px;
    color: var(--silver);
    padding: 6px 14px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13.5px;
    transition: all 0.2s;
  }

  .cal-nav-btn:hover { border-color: var(--celestial); color: var(--celestial); }

  .cal-month-label {
    font-family: var(--font-display);
    font-size: 22.5px;
    color: var(--starwhite);
    min-width: 200px;
    text-align: center;
  }

  .cal-view-toggle {
    display: flex;
    gap: 0;
    border: 1px solid rgba(163,134,90,0.25);
    border-radius: 6px;
    overflow: hidden;
    margin-left: 16px;
  }

  .cal-view-btn {
    background: none;
    border: none;
    color: var(--stardust);
    padding: 6px 14px;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 12.5px;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  .cal-view-btn.active {
    background: rgba(163,134,90,0.15);
    color: var(--gold-accent);
  }

  .cal-view-btn:hover:not(.active) {
    background: rgba(163,134,90,0.06);
  }

  /* ── Week View ── */
  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-top: 24px;
  }

  .week-header {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--silver);
    text-align: center;
    padding: 8px 0;
    letter-spacing: 1px;
  }

  .week-day {
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 6px;
    border-radius: 10px;
    font-size: 15px;
    color: var(--moonlight);
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid rgba(163,134,90,0.1);
    position: relative;
    background: rgba(255,255,255,0.4);
  }

  .week-day:hover { background: rgba(163,134,90,0.08); }
  .week-day.today { border-color: var(--gold-accent); color: var(--gold-accent); }
  .week-day.has-note {
    background: rgba(163,134,90,0.06);
    border-color: rgba(163,134,90,0.2);
  }

  .week-day .practice-dots {
    position: absolute;
    top: 3px;
    left: 4px;
    margin-top: 0;
    gap: 2px;
  }

  .week-day .practice-dot {
    width: 16px;
    height: 16px;
    font-size: 9px;
  }

  .week-day-number {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 4px;
  }

  .week-day-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--stardust);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .week-note-preview {
    font-size: 11px;
    color: var(--silver);
    margin-top: 8px;
    line-height: 1.4;
    max-height: 80px;
    overflow: hidden;
    text-align: center;
    padding: 0 4px;
    word-wrap: break-word;
    word-break: break-word;
    white-space: normal;
    width: 100%;
  }

  .week-nav-label {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--starwhite);
    min-width: 260px;
    text-align: center;
  }

  .cal-note-modal {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #ffffff;
    border: 1px solid rgba(163,134,90,0.25);
    border-radius: 12px;
    padding: 32px;
    z-index: 100;
    width: 440px;
    box-shadow: 0 20px 60px rgba(60,50,40,0.2);
  }

  .cal-note-modal.show { display: block; }

  .cal-note-modal h3 {
    font-family: var(--font-display);
    font-size: 20.5px;
    font-weight: 400;
    color: var(--starwhite);
    margin-bottom: 16px;
  }

  .cal-note-modal textarea {
    width: 100%;
    min-height: 120px;
    background: #faf9f7;
    border: 1px solid rgba(163,134,90,0.15);
    border-radius: 8px;
    padding: 12px;
    color: var(--starwhite);
    font-family: var(--font-body);
    font-size: 14.5px;
    resize: vertical;
    outline: none;
  }

  .cal-note-modal textarea:focus { border-color: rgba(163,134,90,0.4); }

  .cal-modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 16px;
  }

  .cal-modal-btn {
    padding: 10px 24px;
    border-radius: 6px;
    border: 1px solid rgba(163,134,90,0.3);
    background: #ffffff;
    color: #000000;
    font-family: var(--font-body);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .cal-modal-btn.save {
    background: var(--gold-accent);
    color: #ffffff;
    border-color: var(--gold-accent);
  }

  .cal-modal-btn:hover { border-color: var(--gold-accent); }
  .cal-modal-btn.save:hover { background: #b36a3a; }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(60,50,40,0.3);
    z-index: 99;
  }

  .overlay.show { display: block; }

  /* ── Placeholder text ── */
  [contenteditable=true]:empty::before {
    content: attr(data-placeholder);
    color: var(--stardust);
    font-style: italic;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--stardust); border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .sidebar { width: 220px; }
    .main-content { margin-left: 220px; padding: 32px 28px; }
  }

  @media (max-width: 700px) {
    .sidebar {
      width: 100%;
      min-height: auto;
      position: relative;
      border-right: none;
      border-bottom: 1px solid rgba(163,134,90,0.1);
      padding: 20px 0;
    }
    .nav-section { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 12px; }
    .nav-item { padding: 8px 12px; font-size: 13.5px; }
    .main-content { margin-left: 0; padding: 24px 20px; }
    .app-container { flex-direction: column; }
    .page-title { font-size: 32.5px; }
  }

  /* ── Fade-in ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .entry-card { animation: fadeUp 0.4s ease both; }
</style>
</head>
<body>

<!-- Nebula glow elements -->
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<!-- Starfield -->
<div id="starfield"></div>

<!-- Overlay for modals -->
<div class="overlay" id="overlay" onclick="closeCalModal()"></div>

<!-- Calendar note modal -->
<div class="cal-note-modal" id="calModal">
  <h3 id="calModalTitle"></h3>
  <textarea id="calNoteInput" placeholder="Write a note for this day..."></textarea>
  <div class="cal-modal-actions">
    <button class="cal-modal-btn" onclick="closeCalModal()">Cancel</button>
    <button class="cal-modal-btn save" onclick="saveCalNote()">Save</button>
  </div>
</div>

<div class="app-container">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="site-title">Inner Cosmos</div>
    <div class="site-subtitle">a personal journal</div>
    <div class="nav-section">
      <div class="nav-item active" data-section="spirituality">
        <span class="nav-icon">✦</span> Spirituality
      </div>
      <div class="nav-item" data-section="quantum">
        <span class="nav-icon">⟡</span> Quantum Physics
      </div>
      <div class="nav-item" data-section="fusion">
        <span class="nav-icon">☉</span> Nuclear Fusion
      </div>
      <div class="nav-item" data-section="llms">
        <span class="nav-icon">◈</span> LLMs
      </div>
      <div class="nav-item" data-section="film">

// Simple encrypt/decrypt using password
async function deriveKey(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('inner-cosmos-salt'), iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encryptData(data, password) {
  const key = await deriveKey(password);
  const enc = new TextEncoder();
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  const combined = new Uint8Array(iv.length + encrypted.byteLength);
  combined.set(iv);
  combined.set(new Uint8Array(encrypted), iv.length);
  return btoa(String.fromCharCode(...combined));
}

async function decryptData(base64, password) {
  const key = await deriveKey(password);
  const raw = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
  const iv = raw.slice(0, 12);
  const data = raw.slice(12);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
  return JSON.parse(new TextDecoder().decode(decrypted));
}

function showLoginPrompt() {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="page-header">

      <p class="page-epigraph">A personal journal of spirit, science, and discovery.</p>
    </div>

      <div style="margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(163,134,90,0.15);">
        <p style="font-weight: 600; margin-bottom: 10px;">Owner (full access)</p>
        <input type="password" id="tokenInput" placeholder="GitHub token (ghp_...)"
          style="width:100%; padding:12px; border:1px solid rgba(163,134,90,0.3); border-radius:8px; font-family:var(--font-body); font-size:14.5px; background:#faf9f7; color:#000; outline:none; margin-bottom:10px;" />

        <button onclick="submitReader()" style="padding:10px 24px; border-radius:6px; border:1px solid var(--celestial); background:var(--celestial); color:#fff; font-family:var(--font-body); font-size:14px; font-weight:500; cursor:pointer;">View Journal</button>
      </div>

      <p id="loginError" style="color:#c06050; margin-top:12px; font-size:13px; display:none;"></p>
    </div>
  `;
}

async function submitToken() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  try {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (!res.ok) throw new Error('Invalid token or Gist not accessible');
    setToken(token);
    isReadOnly = false;
    await loadFromGist();
    renderSection();
  } catch (e) {
    errEl.textContent = e.message + ' — please check your token and try again.';
    errEl.style.display = 'block';
  }
}

async function submitReader() {
  const password = document.getElementById('readerInput').value.trim();
  if (!password) return;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (password !== READER_PASSWORD) {
    errEl.textContent = 'Incorrect password.';
    errEl.style.display = 'block';
    return;
  }

  // Reader needs the token to fetch encrypted data from Gist
  // We'll try loading the encrypted file from Gist without auth (public readable portion)
  // Since Gist is private, we store encrypted snapshot in localStorage from owner sessions
  // and also try fetching via a cached approach

  try {
    const cached = localStorage.getItem('inner_cosmos_encrypted');
    if (!cached) {
      errEl.textContent = 'No journal data available yet. The owner needs to save entries from this device first, or share the journal file directly.';
      errEl.style.display = 'block';
      return;
    }
    gistData = await decryptData(cached, READER_PASSWORD);
    isReadOnly = true;
    setReaderAuth();
    renderSection();
  } catch (e) {
    errEl.textContent = 'Unable to decrypt journal data. Please check the password.';
    errEl.style.display = 'block';
  }
}

async function loadFromGist() {
  const token = getToken();
  if (!token) return;
  isLoading = true;
  try {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { 'Authorization': `token ${token}` }
    });
    if (!res.ok) throw new Error('Failed to load');
    const gist = await res.json();
    const file = gist.files['inner-cosmos-data.json'];
    if (file && file.content) {
      gistData = JSON.parse(file.content);
    }
    migratePracticeKeys();
    // Cache encrypted snapshot for readers on this device
    try {
      const encrypted = await encryptData(gistData, READER_PASSWORD);
      localStorage.setItem('inner_cosmos_encrypted', encrypted);
    } catch(e) { console.error('Encrypt cache error:', e); }
  } catch (e) {
    console.error('Load error:', e);
  }
  isLoading = false;
}

// ── Migrate old practice keys: hatha→yoga, exercise→aerobic ──
function migratePracticeKeys() {
  const log = gistData['practices'];
  if (!log) return;
  let changed = false;
  for (const dateKey in log) {
    const p = log[dateKey];
    if (p.hatha !== undefined) {
      p.yoga = p.hatha;
      delete p.hatha;
      changed = true;
    }
    if (p.exercise !== undefined) {
      p.aerobic = p.exercise;
      delete p.exercise;
      changed = true;
    }
  }
  if (changed && !isReadOnly) {
    saveToGist();
  }
}

function saveToGist() {
  if (isReadOnly) return;
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    const token = getToken();
    if (!token) return;
    try {
      await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        method: 'PATCH',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          files: { 'inner-cosmos-data.json': { content: JSON.stringify(gistData) } }
        })
      });
      // Update encrypted cache for readers
      try {
        const encrypted = await encryptData(gistData, READER_PASSWORD);
        localStorage.setItem('inner_cosmos_encrypted', encrypted);
      } catch(e) { console.error('Encrypt cache error:', e); }
    } catch (e) {
      console.error('Save error:', e);
    }
  }, 1500);
}

// ── Storage helpers (backed by Gist) ──
function getEntries(section) {
  return gistData[`journal_${section}`] || [];
}

function saveEntries(section, entries) {
  if (isReadOnly) return;
  gistData[`journal_${section}`] = entries;
  saveToGist();
}

function getCalNotes() {
  return gistData['cal_notes'] || {};
}

function saveCalNotes(notes) {
  if (isReadOnly) return;
  gistData['cal_notes'] = notes;
  saveToGist();
}

function getExerciseLog() {
  return gistData['practices'] || {};
}

function saveExerciseLog(log) {
  if (isReadOnly) return;
  gistData['practices'] = log;
  saveToGist();
}

function togglePractice(dateKey, practice, event) {
  event.stopPropagation();
  if (isReadOnly) return;
  const log = getExerciseLog();
  if (!log[dateKey]) log[dateKey] = {};
  if (log[dateKey][practice]) {
    delete log[dateKey][practice];
    if (Object.keys(log[dateKey]).length === 0) delete log[dateKey];
  } else {
    log[dateKey][practice] = true;
  }
  saveExerciseLog(log);
  renderCalendar();
}

// ── Generate starfield ──
function createStars() {
  const field = document.getElementById('starfield');
  for (let i = 0; i < 180; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 2 + 0.5;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
    star.style.setProperty('--delay', (Math.random() * 5) + 's');
    star.style.setProperty('--min-opacity', (Math.random() * 0.2 + 0.05).toFixed(2));
    star.style.setProperty('--max-opacity', (Math.random() * 0.5 + 0.4).toFixed(2));
    field.appendChild(star);
  }
}

// ── Navigation ──
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    currentSection = item.dataset.section;
    renderSection();
  });

// ── Render section ──
function renderSection() {
  const main = document.getElementById('mainContent');
  const sec = sections[currentSection];

  if (currentSection === 'calendar') {
    renderCalendar();
    return;
  }

  const entries = getEntries(currentSection);

  let html = `
    <div class="page-header">
      <h1 class="page-title">${sec.title}</h1>
      <p class="page-epigraph">${sec.epigraph}</p>
      ${isReadOnly ? '<p style="font-size:12px; color:var(--gold-accent); margin-top:8px;">Viewing in read-only mode</p>' : ''}
    </div>
    <div class="entries-container" id="entriesContainer">
  `;

  entries.forEach((entry, i) => {
    html += renderEntryCard(entry, i);
  });

  html += `</div>`;

  if (!isReadOnly) {
    html += `<button class="add-entry-btn" onclick="addEntry()">
      + New Entry
    </button>`;
  }

  main.innerHTML = html;
}

function renderEntryCard(entry, index) {
  const editable = !isReadOnly;
  const imagesHtml = (entry.images || []).map((src, imgIdx) => `
    <div class="img-wrapper">
      <img src="${src}" alt="">
      ${editable ? `<button class="img-remove-btn" onclick="removeImage(${index}, ${imgIdx})">×</button>` : ''}
    </div>
  `).join('');

  return `
    <div class="entry-card" style="animation-delay: ${index * 0.05}s">
      ${editable ? `<div class="entry-actions">
        <button class="entry-btn delete" onclick="deleteEntry(${index})" title="Delete entry">×</button>
      </div>` : ''}
      <div class="entry-date">${entry.date}</div>
      <div class="entry-title" ${editable ? `contenteditable="true" data-placeholder="Entry title..."
           oninput="updateEntry(${index}, 'title', this.textContent)"` : ''}>${entry.title || ''}</div>
      <div class="entry-body" ${editable ? `contenteditable="true" data-placeholder="Write your thoughts here..."
           oninput="updateEntry(${index}, 'body', this.innerHTML)"` : ''}>${entry.body || ''}</div>
      <div class="entry-images">${imagesHtml}</div>
      ${editable ? `<div class="image-upload-zone" onclick="triggerImageUpload(${index})">
        + Add image (click to browse)
      </div>` : ''}
    </div>
  `;
}

// ── Entry operations ──
function addEntry() {
  const entries = getEntries(currentSection);
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  }).toUpperCase();

  entries.unshift({
    date: dateStr,
    title: '',
    body: '',
    images: [],
    created: now.toISOString()
  });

  saveEntries(currentSection, entries);
  renderSection();

  // Focus the new entry title
  setTimeout(() => {
    const firstTitle = document.querySelector('.entry-title');
    if (firstTitle) firstTitle.focus();
  }, 100);
}

function updateEntry(index, field, value) {
  const entries = getEntries(currentSection);
  if (entries[index]) {
    entries[index][field] = value;
    saveEntries(currentSection, entries);
  }
}

function deleteEntry(index) {
  if (!confirm('Remove this entry?')) return;
  const entries = getEntries(currentSection);
  entries.splice(index, 1);
  saveEntries(currentSection, entries);
  renderSection();
}

function triggerImageUpload(entryIndex) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = true;
  input.onchange = (e) => {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const entries = getEntries(currentSection);
        if (!entries[entryIndex].images) entries[entryIndex].images = [];
        entries[entryIndex].images.push(ev.target.result);
        saveEntries(currentSection, entries);
        renderSection();
      };
      reader.readAsDataURL(file);
    });
  };
  input.click();
}

function removeImage(entryIndex, imgIndex) {
  const entries = getEntries(currentSection);
  entries[entryIndex].images.splice(imgIndex, 1);
  saveEntries(currentSection, entries);
  renderSection();
}

// ── Calendar ──
function renderCalendar() {
  if (calView === 'week') {
    renderWeekView();
    return;
  }
  const main = document.getElementById('mainContent');
  const sec = sections.calendar;
  const now = new Date();
  if (!calYear) { calYear = now.getFullYear(); calMonth = now.getMonth(); }

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const monthName = new Date(calYear, calMonth).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const notes = getCalNotes();
  const practiceLog = getExerciseLog();
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let html = `
    <div class="page-header">
      <h1 class="page-title">${sec.title}</h1>
      <p class="page-epigraph">${sec.epigraph}</p>
    </div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">◂ Prev</button>
      <span class="cal-month-label">${monthName}</span>
      <button class="cal-nav-btn" onclick="changeMonth(1)">Next ▸</button>
      <div class="cal-view-toggle">
        <button class="cal-view-btn active" onclick="setCalView('month')">Month</button>
        <button class="cal-view-btn" onclick="setCalView('week')">Week</button>
      </div>
    </div>
    <div class="calendar-grid">
      ${dayNames.map(d => `<div class="cal-header">${d}</div>`).join('')}
      ${'<div class="cal-day empty"></div>'.repeat(firstDay)}
  `;

  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = d === now.getDate() && calMonth === now.getMonth() && calYear === now.getFullYear();
    const hasNote = notes[dateKey];
    const p = practiceLog[dateKey] || {};

    const preview = hasNote ? `<div class="cal-note-preview">${hasNote.substring(0, 80)}</div>` : '';
    const tooltip = hasNote ? `<div class="cal-tooltip">${hasNote.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>` : '';

    const dots = buildPracticeDots(dateKey, p);

    const classes = [
      isToday ? 'today' : '',
      hasNote ? 'has-note' : ''
    ].filter(Boolean).join(' ');

    html += `<div class="cal-day ${classes}"
                  onclick="openCalNote('${dateKey}', ${d})">${dots}${d}${preview}${tooltip}</div>`;
  }

  html += `</div>`;
  main.innerHTML = html;
}

function buildPracticeDots(dateKey, p) {
  return `<div class="practice-dots">` +
    `<div class="practice-dot yoga ${p.yoga ? 'active' : ''}" onclick="togglePractice('${dateKey}','yoga',event)" title="Yoga">Y</div>` +
    `<div class="practice-dot meditation ${p.meditation ? 'active' : ''}" onclick="togglePractice('${dateKey}','meditation',event)" title="Meditation">M</div>` +
    `<div class="practice-dot aerobic ${p.aerobic ? 'active' : ''}" onclick="togglePractice('${dateKey}','aerobic',event)" title="Aerobic">A</div>` +
    `<div class="practice-dot strength ${p.strength ? 'active' : ''}" onclick="togglePractice('${dateKey}','strength',event)" title="Strength">S</div>` +
    `</div>`;
}

function setCalView(view) {
  calView = view;
  if (view === 'week' && !calWeekStart) {
    const now = new Date();
    const day = now.getDay();
    calWeekStart = new Date(now);
    calWeekStart.setDate(now.getDate() - day);
    calWeekStart.setHours(0,0,0,0);
  }
  renderCalendar();
}

function renderWeekView() {
  const main = document.getElementById('mainContent');
  const sec = sections.calendar;
  const now = new Date();
  now.setHours(0,0,0,0);

  if (!calWeekStart) {
    const day = now.getDay();
    calWeekStart = new Date(now);
    calWeekStart.setDate(now.getDate() - day);
  }

  const weekEnd = new Date(calWeekStart);
  weekEnd.setDate(calWeekStart.getDate() + 6);

  const startLabel = calWeekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const endLabel = weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  const notes = getCalNotes();
  const practiceLog = getExerciseLog();
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let html = `
    <div class="page-header">
      <h1 class="page-title">${sec.title}</h1>
      <p class="page-epigraph">${sec.epigraph}</p>
    </div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeWeek(-1)">◂ Prev</button>
      <span class="week-nav-label">${startLabel} — ${endLabel}</span>
      <button class="cal-nav-btn" onclick="changeWeek(1)">Next ▸</button>
      <div class="cal-view-toggle">
        <button class="cal-view-btn" onclick="setCalView('month')">Month</button>
        <button class="cal-view-btn active" onclick="setCalView('week')">Week</button>
      </div>
    </div>
    <div class="week-grid">
  `;

  for (let i = 0; i < 7; i++) {
    const d = new Date(calWeekStart);
    d.setDate(calWeekStart.getDate() + i);
    const dateKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isToday = d.getTime() === now.getTime();
    const hasNote = notes[dateKey];
    const p = practiceLog[dateKey] || {};
    const dayName = dayNames[d.getDay()];

    const preview = hasNote ? `<div class="week-note-preview">${hasNote.substring(0, 80)}</div>` : '';
    const dots = buildPracticeDots(dateKey, p);

    const classes = [
      isToday ? 'today' : '',
      hasNote ? 'has-note' : ''
    ].filter(Boolean).join(' ');

    html += `<div class="week-day ${classes}" onclick="openCalNote('${dateKey}', ${d.getDate()})">
      <div class="week-day-name">${dayName}</div>
      <div class="week-day-number">${d.getDate()}</div>
      ${dots}
      ${preview}
    </div>`;
  }

  html += `</div>`;
  main.innerHTML = html;
}

function changeWeek(delta) {
  calWeekStart.setDate(calWeekStart.getDate() + (delta * 7));
  renderCalendar();
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function openCalNote(dateKey, day) {
  calSelectedDate = dateKey;
  const notes = getCalNotes();
  const parts = dateKey.split('-');
  const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
  const label = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  document.getElementById('calModalTitle').textContent = label;
  document.getElementById('calNoteInput').value = notes[dateKey] || '';
  document.getElementById('calModal').classList.add('show');
  document.getElementById('overlay').classList.add('show');
  setTimeout(() => document.getElementById('calNoteInput').focus(), 100);
}

function closeCalModal() {
  document.getElementById('calModal').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
}

function saveCalNote() {
  if (isReadOnly) { closeCalModal(); return; }
  const notes = getCalNotes();
  const val = document.getElementById('calNoteInput').value.trim();
  if (val) { notes[calSelectedDate] = val; }
  else { delete notes[calSelectedDate]; }
  saveCalNotes(notes);
  closeCalModal();
  renderCalendar();
}

// ── Init ──
createStars();
(async function init() {
  const token = getToken();
  if (token) {
    isReadOnly = false;
    await loadFromGist();
    renderSection();
    return;
  }
  if (getReaderAuth()) {
    const cached = localStorage.getItem('inner_cosmos_encrypted');
    if (cached) {
      try {
        gistData = await decryptData(cached, READER_PASSWORD);
        isReadOnly = true;
        renderSection();
        return;
      } catch(e) { /* fall through to login */ }
    }
  }
  showLoginPrompt();
})();
</script>
